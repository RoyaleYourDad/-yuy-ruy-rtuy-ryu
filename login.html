<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - Legal AI Uzbekistan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Left Side - Image -->
        <div class="auth-image">
            <div class="auth-image-content">
                <h2>O'zbekistoning eng katta yuridik platformasi</h2>
                <p>500+ yurist, AI yordamchi va hujjatlar generatori - barchasi bir joyda</p>
                <div class="auth-features">
                    <div class="feature-item">
                        <span>✓</span>
                        <p>Tezkor yuridik yordam</p>
                    </div>
                    <div class="feature-item">
                        <span>✓</span>
                        <p>Professional yuristlar</p>
                    </div>
                    <div class="feature-item">
                        <span>✓</span>
                        <p>Bepul hujjatlar</p>
                    </div>
                </div>
            </div>
            <div class="auth-image-pattern"></div>
        </div>

        <!-- Right Side - Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper fade-in-up">
                <a href="index.html" class="auth-logo">
                    <span class="logo-icon">⚖️</span>
                    <span class="logo-text">Legal AI</span>
                </a>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Kirish</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">Ro'yxatdan o'tish</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Telefon raqam</label>
                        <input type="tel" required placeholder="+998 __ ___ __ __" id="loginPhone">
                    </div>
                    <div class="form-group">
                        <label>Parol</label>
                        <input type="password" required placeholder="Parolingizni kiriting" id="loginPassword">
                        <a href="#" class="forgot-password">Parolni unutdingizmi?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Kirish</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ism</label>
                            <input type="text" required placeholder="Ismingiz">
                        </div>
                        <div class="form-group">
                            <label>Familiya</label>
                            <input type="text" required placeholder="Familiyangiz">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Telefon raqam</label>
                        <input type="tel" required placeholder="+998 __ ___ __ __">
                    </div>
                    <div class="form-group">
                        <label>Email (ixtiyoriy)</label>
                        <input type="email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Parol</label>
                        <input type="password" required placeholder="Kamida 8 ta belgi">
                    </div>
                    <div class="form-group">
                        <label>Parolni tasdiqlang</label>
                        <input type="password" required placeholder="Parolni qayta kiriting">
                    </div>
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            <span class="label-text"><a href="#">Foydalanish shartlari</a> va <a href="#">maxfiylik siyosati</a>ga roziman</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Ro'yxatdan o'tish</button>
                </form>

                <div class="auth-divider">
                    <span>yoki</span>
                </div>

                <div class="social-auth">
                    <button class="btn btn-social btn-google">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google orqali davom etish
                    </button>
                    <button class="btn btn-social btn-telegram">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                        </svg>
                        Telegram orqali davom etish
                    </button>
                </div>

                <p class="auth-footer">
                    Akkauntingiz yo'qmi? <a href="#" onclick="switchAuthTab('register'); return false;">Ro'yxatdan o'ting</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('isLoggedIn', 'true');
            alert('Xush kelibsiz! Bosh sahifaga yo\'naltirilmoqdasiz...');
            window.location.href = 'index.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            alert('Ro\'yxatdan o\'tish muvaffaqiyatli! Endi tizimga kirishingiz mumkin.');
            switchAuthTab('login');
        }
    </script>
</body>
</html>
