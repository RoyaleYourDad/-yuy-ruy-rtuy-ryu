<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirish - Legal AI Uzbekistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Crimson Pro', 'serif']
                    },
                    colors: {
                        slate: {
                            950: '#0f172a',
                            900: '#1e293b',
                            800: '#334155',
                            700: '#475569',
                            600: '#64748b',
                            400: '#94a3b8',
                            300: '#cbd5e1',
                            200: '#e2e8f0',
                            100: '#f1f5f9'
                        },
                        amber: {
                            500: '#fbbf24',
                            600: '#f59e0b'
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s infinite'
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { touch-action: manipulation; }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(148, 163, 184, 0.1); 
        }
        .input-focus:focus { 
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15); 
            border-color: rgba(251, 191, 36, 0.5); 
        }
        .btn-active:active { transform: scale(0.98); }
        .auth-tab.active { 
            border-bottom-color: #fbbf24; 
            color: #f1f5f9; 
        }
        .checkbox-label input:checked + .checkmark { 
            background: #fbbf24; 
            border-color: #fbbf24; 
        }
        .checkbox-label input:checked + .checkmark::after { 
            display: block; 
        }
        @media (pointer: coarse) { 
            button, a, [role="button"] { min-height: 44px; } 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased min-h-screen selection:bg-amber-500/30 selection:text-amber-100">
    
    <div class="min-h-screen flex">
        <!-- Left Side - Image (Desktop) -->
        <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-slate-900 to-slate-950 relative items-center justify-center p-8 overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_20%_80%,rgba(251,191,36,0.08)_0%,transparent_50%),radial-gradient(ellipse_at_80%_20%,rgba(251,191,36,0.05)_0%,transparent_50%)] pointer-events-none"></div>
            
            <div class="relative z-10 max-w-md text-center lg:text-left">
                <h2 class="serif text-2xl lg:text-3xl font-semibold text-slate-100 mb-4 leading-tight">O'zbekistoning eng katta yuridik platformasi</h2>
                <p class="text-slate-400 mb-8 text-sm lg:text-base">500+ yurist, AI yordamchi va hujjatlar generatori - barchasi bir joyda</p>
                
                <div class="space-y-3">
                    <div class="flex items-center gap-3 text-slate-300">
                        <span class="text-amber-500 font-bold text-lg">✓</span>
                        <p class="text-sm">Tezkor yuridik yordam</p>
                    </div>
                    <div class="flex items-center gap-3 text-slate-300">
                        <span class="text-amber-500 font-bold text-lg">✓</span>
                        <p class="text-sm">Professional yuristlar</p>
                    </div>
                    <div class="flex items-center gap-3 text-slate-300">
                        <span class="text-amber-500 font-bold text-lg">✓</span>
                        <p class="text-sm">Bepul hujjatlar</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-4 lg:p-8">
            <div class="w-full max-w-md glass-panel rounded-2xl p-6 lg:p-8 border border-slate-800/50 animate-fade-in-up">
                
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-2 mb-6 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-xl flex items-center justify-center group-hover:border-amber-500/50 transition-colors">
                        <span class="text-amber-500 text-lg">⚖️</span>
                    </div>
                    <span class="serif text-xl font-semibold text-slate-100 tracking-tight">Legal AI</span>
                </a>

                <!-- Tabs -->
                <div class="flex border-b border-slate-800 mb-6">
                    <button class="auth-tab active flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent transition-colors" onclick="switchAuthTab('login')">Kirish</button>
                    <button class="auth-tab flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent transition-colors" onclick="switchAuthTab('register')">Ro'yxatdan o'tish</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active space-y-4" onsubmit="handleLogin(event)">
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Telefon raqam</label>
                        <input type="tel" required placeholder="+998 __ ___ __ __" id="loginPhone" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Parol</label>
                        <input type="password" required placeholder="Parolingizni kiriting" id="loginPassword" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                        <a href="#" class="text-xs text-amber-500/80 hover:text-amber-500 transition-colors block mt-1">Parolni unutdingizmi?</a>
                    </div>
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-slate-950 font-semibold py-3 px-4 rounded-xl transition-all btn-active text-sm">Kirish</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form hidden space-y-4" onsubmit="handleRegister(event)">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Ism</label>
                            <input type="text" required placeholder="Ismingiz" 
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Familiya</label>
                            <input type="text" required placeholder="Familiyangiz" 
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Telefon raqam</label>
                        <input type="tel" required placeholder="+998 __ ___ __ __" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Email <span class="text-slate-600">(ixtiyoriy)</span></label>
                        <input type="email" placeholder="email@example.com" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Parol</label>
                        <input type="password" required placeholder="Kamida 8 ta belgi" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Parolni tasdiqlang</label>
                        <input type="password" required placeholder="Parolni qayta kiriting" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 outline-none input-focus transition-all text-sm">
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-label flex items-start gap-3 cursor-pointer group">
                            <div class="relative mt-0.5">
                                <input type="checkbox" required class="sr-only peer">
                                <div class="checkmark w-5 h-5 border border-slate-600 rounded-md bg-slate-900/50 peer-checked:bg-amber-500 peer-checked:border-amber-500 transition-all flex items-center justify-center">
                                    <svg class="w-3 h-3 text-slate-950 opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                            </div>
                            <span class="text-xs text-slate-400 leading-relaxed"><a href="#" class="text-amber-500/80 hover:text-amber-500 transition-colors">Foydalanish shartlari</a> va <a href="#" class="text-amber-500/80 hover:text-amber-500 transition-colors">maxfiylik siyosati</a>ga roziman</span>
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-slate-950 font-semibold py-3 px-4 rounded-xl transition-all btn-active text-sm">Ro'yxatdan o'tish</button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                    <div class="relative flex justify-center text-xs"><span class="bg-slate-900/70 px-3 text-slate-500">yoki</span></div>
                </div>

                <!-- Social Auth -->
                <div class="space-y-3">
                    <button class="btn-social btn-google w-full flex items-center justify-center gap-3 bg-slate-900/50 hover:bg-slate-800/50 border border-slate-700 text-slate-300 py-3 px-4 rounded-xl transition-all btn-active text-sm">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google orqali davom etish
                    </button>
                    <button class="btn-social btn-telegram w-full flex items-center justify-center gap-3 bg-slate-900/50 hover:bg-slate-800/50 border border-slate-700 text-slate-300 py-3 px-4 rounded-xl transition-all btn-active text-sm">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                        Telegram orqali davom etish
                    </button>
                </div>

                <!-- Footer -->
                <p class="text-center text-xs text-slate-500 mt-6">
                    Akkauntingiz yo'qmi? <a href="#" onclick="switchAuthTab('register'); return false;" class="text-amber-500/90 hover:text-amber-500 transition-colors font-medium">Ro'yxatdan o'ting</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => {
                f.classList.add('hidden');
                f.classList.remove('active');
            });
            
            event.target.classList.add('active');
            const form = document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm');
            form.classList.remove('hidden');
            form.classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('isLoggedIn', 'true');
            alert('Xush kelibsiz! Bosh sahifaga yo\'naltirilmoqdasiz...');
            window.location.href = 'index.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            alert('Ro\'yxatdan o\'tish muvaffaqiyatli! Endi tizimga kirishingiz mumkin.');
            switchAuthTab('login');
        }
    </script>
</body>
</html>
