    response: `**Mehnat Huquqi – Batafsil Qo'llanma**

**1. Mehnat Shartnomasi Asoslari (MK 72-85-moddalar)**
• Shartnoma faqat yozma shaklda tuziladi va 2 nusxada beriladi – biri xodimda, biri ishberuvchida saqlanadi.
• Majburiy shartlar: lavozim, ish joyi, ish haqi miqdori, ish vaqti rejimi, mehnat sharoitlari.
• Sinov muddati 3 oydan oshmasligi kerak (rahbar lavozimlar uchun 6 oygacha).

**2. Ish Vaqti va Dam Olish (MK 115-125-moddalar)**
• Normal ish vaqti: haftasiga 40 soat, kuniga 8 soat.
• Tunda ishlash (22:00-06:00) uchun har bir soat uchun qo'shimcha haq to'lanadi.
• Yillik asosiy mehnat ta'tili: kamida 15 ish kuni, ba'zi toifalar uchun 21-30 kungacha.

**3. Ishdan Bo'shatish Tartibi (MK 159-167-moddalar)**
• Xodimning o'z iltimosiga ko'ra: 2 hafta oldin yozma ariza berish.
• Ishberuvchi tashabbusi bilan: asosli sabab + yozma ogohlantirish + kasaba uyushmasi bilan maslahatlashish (agar mavjud bo'lsa).
• Qonunga zid bo'shatish holatlarida: sudga 1 oy ichida murojaat qilish huquqi.

**4. Ish Haqi va Kafolatlar (MK 168-180-moddalar)**
• Minimal ish haqi davlat tomonidan belgilanadi, undan past to'lash taqiqlanadi.
• Ish haqi oyda kamida 2 marta to'lanishi shart.
• Kasallik varaqasi bo'yicha to'lov: sug'urta muddatiga qarab 60-100% miqdorida.

**5. Nizolarni Hal Qilish (MK 242-245-moddalar)**
• Mehnat nizolari bo'yicha sudga murojaat muddati: 3 oy (ishdan nohaq bo'shatilgan taqdirda 1 oy).
• Davlat bojidan ozod qilingan toifalar: mehnat huquqi buzilgan xodimlar.

⚠️ **Muhim Ogohlantirishlar:**
• Hech qanday hujjatni tushunmasdan imzolamang.
• Barcha yozishmalarni (buyruqlar, buyurtmalar) nusxasini saqlab qoling.
• Ish beruvchi mehnat shartnomasini bermasa, Mehnat Inspeksiyasiga murojaat qiling.

📌 **Amaliy Maslahat:** Ish haqi kechiktirilayotgan bo'lsa, avval yozma talabnoma yuboring, keyin Mehnat Inspeksiyasi yoki sudga murojaat qiling.`,

    keywords: ['nikoh', 'ajrashish', 'oilaviy', 'aliment', 'farzand', 'ota-ona', 'mulk taqsimoti', 'vasiylik'],
    response: `**Oilaviy Huquq – To'liq Yo'riqnoma**

**1. Nikoh Tuzish va Bekor Qilish (OK 15-30-moddalar)**
• Nikoh faqat Fuqarolik Holati Dasturlari (FHDYo) organlarida ro'yxatdan o'tkazilganda haqiqiy hisoblanadi.
• Nikoh shartnomasi: mulk taqsimoti, aliment majburiyatlari kabi masalalarni oldindan belgilash imkonini beradi.
• Nikohni bekor qilish: o'zaro rozilik bilan FHDYo orqali (farzandlar bo'lmasa) yoki sud tartibida.

**2. Aliment Majburiyatlari (OK 106-120-moddalar)**
• Ota-ona voyaga yetmagan farzandlari uchun aliment to'lashga majbur:
  - 1 farzand: daromadning 25%
  - 2 farzand: 33%
  - 3 va undan ortiq: 50%
• Aliment miqdori sud tomonidan belgilanishi ham mumkin (agar daromad noaniq bo'lsa).
• Alimentdan bo'yin tovlash: ma'muriy javobgarlik (jarima) yoki jinoiy javobgarlik (uzoq muddatli to'lovdan qochish holatlarida).

**3. Farzandlar Bilan Bog'liq Masalalar (OK 65-79-moddalar)**
• Farzandning yashash joyi: ota-ona kelisha olmasa, sud farzandning manfaatlarini hisobga olgan holda qaror qiladi.
• 10 yoshdan oshgan farzandning fikri sud tomonidan inobatga olinadi.
• Ota-onalik huquqidan mahrum qilish: faqat sud qarori bilan, og'ir holatlarda (zo'ravonlik, giyohvandlik, bolani tashlab ketish).

**4. Mulk Taqsimoti (OK 33-38-moddalar)**
• Nikoh davomida sotib olingan mulk – er-xotinning qo'shma mulki hisoblanadi.
• Taqsimot: odatda teng ulushlarda, lekin sud farzandlar manfaatini yoki bir tomonning hissasi kattaligini hisobga olishi mumkin.
• Shaxsiy mulk (nikohgacha olingan, meros yoki sovg'a sifatida olingan) taqsimlanmaydi.

**5. Vasiylik va Homiylik (OK 140-155-moddalar)**
• Vasiylik: 14 yoshgacha bo'lgan bolalar uchun.
• Homiylik: 14-18 yoshli o'smirlar uchun.
• Vasiy/homiy tayinlash: ota-onalar vafot etgan yoki huquqlaridan mahrum bo'lgan taqdirda.

⚠️ **Muhim Ogohlantirishlar:**
• Ajrashish jarayonida barcha moliyaviy hujjatlarni saqlang.
• Aliment to'lovlarini har doim rasmiy yo'l orqali (bank orqali) amalga oshiring – bu isbot bo'ladi.
• Farzand manfaatini har doim birinchi o'ringa qo'ying – sud buni yuqori baholaydi.

📌 **Amaliy Maslahat:** Oilaviy nizolarda vositachilik (mediatsiya) jarayonidan foydalanish vaqtni va mablag'ni tejashga yordam beradi.`,

    keywords: ['uy', 'kvartira', 'ko\'chmas', 'mulk', 'yer', 'sotib', 'ijara', 'ipoteka', 'ro\'yxatdan o\'tkazish'],
    response: `**Ko'chmas Mulk Huquqi – Batafsil Qo'llanma**

**1. Mulk Huquqi Asoslari (FK 185-240-moddalar)**
• Ko'chmas mulk huquqi faqat davlat ro'yxatidan o'tkazilgandan keyin amalga oshadi (Kadastriy palata orqali).
• Mulk huquqini tasdiqlovchi hujjat: Davlat ro'yxatidan o'tkazish guvohnomasi.
• Mulk huquqini o'tkazish: sotish-olish shartnomasi + davlat ro'yxatidan o'tkazish + boj to'lovi.

**2. Sotish-Olish Shartnomasi Talablari (FK 224-235-moddalar)**
• Shartnoma yozma shaklda, notarial tasdiqlash tavsiya etiladi.
• Majburiy shartlar: mulkning aniq tavsifi (manzili, maydoni, kadastr raqami), narxi, to'lov shartlari, javobgarlik.
• Xaridor mulkni tekshirish huquqiga ega: hujjatlarni, qarzdorliklarni, cheklovlarni (ipoteka, arest).

**3. Ijara Munosabatlari (FK 400-420-moddalar)**
• Ijara shartnomasi: 1 yildan kam muddatga yozma shart talab qilinmaydi, lekin tavsiya etiladi.
• Ijarachi huquqlari: mulkdan shartnomaga muvofiq foydalanish, ta'mirlash xarajatlarini qoplashni talab qilish.
• Ijara beruvchi huquqlari: to'lovni o'z vaqtida talab qilish, mulkka zarar yetkazilganda kompensatsiya so'rash.

**4. Ipoteka Kreditlari (Qonun "Ipoteka kreditlari to'g'risida")**
• Boshlang'ich to'lov: odatda 20-30%, ba'zi dasturlarda 10% gacha.
• Kredit muddati: 3 yildan 20 yilgacha.
• Sug'urta: mulk sug'urtasi majburiy, hayot sug'urtasi tavsiya etiladi.
• Kreditni erta qaytarish: ba'zi banklar komissiya undirishi mumkin – shartnomani diqqat bilan o'qing.

**5. Yer Maydonlari Bilan Ishlash (Yer Kodeksi)**
• Yer uchastkalari: davlat mulki yoki xususiy mulk bo'lishi mumkin.
• Qishloq xo'jaligi yerlari: faqat maqsadli foydalanishga ruxsat beriladi.
• Yer uchastkasini sotib olishda: maqsadli tayinlanishini, kommunal infratuzilma mavjudligini tekshiring.

⚠️ **Muhim Ogohlantirishlar:**
• Hech qachon "og'zaki kelishuv"ga ishonmang – barcha shartlarni yozma shaklda rasmiylashtiring.
• Mulk operatsiyalarida notarius yoki yurist ishtiroki majburiy emas, lekin xavfsizlik uchun tavsiya etiladi.
• Davlat bojini to'lashdan oldin imtiyozli toifalarga kirishingizni tekshiring (nogironlar, nafaqaxo'rlar).

📌 **Amaliy Maslahat:** Mulk sotib olayotganda, "toza" huquqiy tarixga ega ekanligini tekshirish uchun Kadastriy palatadan arxiv ma'lumotnomasi so'rang.`,

    response: `**Meros Huquqi – To'liq Yo'riqnoma**

**1. Meros Ochilishi va Qabul Qilish (FK 1140-1160-moddalar)**
• Meros meros qoldiruvchi vafot etgan kundan boshlab ochiladi.
• Merosni qabul qilish muddati: 6 oy (vafot sanasidan boshlab).
• Qabul qilish usullari: notariusga ariza berish yoki meros mulkini faktik boshqarish (to'lovlarni amalga oshirish, mulkni saqlash).

**2. Vorislik Tartibi (Qonuniy Vorislik)**
**1-navbat vorislari:**
• Turmush o'rtog'i (qonuniy nikohda bo'lgan)
• Farzandlar (tug'ilgan va asrab olingan)
• Ota-ona

**2-navbat vorislari** (agar 1-navbat vorislari bo'lmasa):
• Aka-uka, opa-singil
• Bobo-buvi, buva-moma

**3-navbat vorislari:**
• Amaki-xolalar, tog'a-daydilar

• Har bir navbat ichida mulk teng ulushlarda taqsimlanadi.

**3. Vasiyatnoma Orqali Meros Qoldirish (FK 1161-1180-moddalar)**
• Vasiyatnoma faqat vasiyat qoldiruvchining shaxsiy irodasi bilan tuziladi.
• Majburiy notarial tasdiqlash talab qilinadi.
• Majburiy ulush: voyaga yetmagan yoki mehnatga yaroqsiz farzandlar, ota-ona, turmush o'rtog'i vasiyatnomaga qaramay merosning kamida yarmini olish huquqiga ega.

**4. Meros Tarkibi va Majburiyatlar**
• Merosga kiradi: ko'chmas va ko'char mulk, pul mablag'lari, aksiyalar, intellektual mulk huquqlari.

// === State ===
let currentSession = { id: generateId(), messages: [], isStreaming: false };

// === Init ===
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('messageInput');
  if (input) input.focus();
  loadSavedSessions();
});

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

// === Sidebar ===
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = !sidebar.classList.contains('-translate-x-full');
  sidebar.classList.toggle('-translate-x-full', isOpen);
  overlay?.classList.toggle('hidden', isOpen);
}

// === Input ===
function autoResize(t) {
  t.style.height = 'auto';
  t.style.height = Math.min(t.scrollHeight, 80) + 'px';
  document.getElementById('sendBtn').disabled = !t.value.trim();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuickMessage(text) {
  const input = document.getElementById('messageInput');
  if (input) { input.value = text; autoResize(input); sendMessage(); }
}

// === Send ===
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input?.value.trim();
  if (!text || currentSession.isStreaming) return;
  
  document.getElementById('welcomeScreen').style.display = 'none';
  addMessage(text, 'user');
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  
  await streamResponse(findResponse(text));
}

function findResponse(text) {
  const lower = text.toLowerCase();
  for (const [key, data] of Object.entries(knowledgeBase)) {
    if (data.keywords.some(k => lower.includes(k))) return data;
  }
  return {
    response: `**Mavzu topilmadi**\n\nQuyidagilardan birini tanlang:\n• Mehnat huquqi\n• Oilaviy huquq\n• Ko'chmas mulk\n• Meros huquqi\n• Biznes huquqi\n• Jinoyat huquqi\n\nYoki savolingizni aniqroq yozing.`,
    lawyers: [{ name: 'Azizov S.', spec: 'Umumiy', rating: 4.8, id: 1 }]
  };
}

// === Stream Response ===
async function streamResponse(data) {
  currentSession.isStreaming = true;
  const container = document.getElementById('messagesContainer');
  
  const msg = document.createElement('div');
  msg.className = 'flex gap-3 message-enter';
  msg.innerHTML = `<div class="w-8 h-8 bg-slate-800 border border-slate-700 rounded-lg flex items-center justify-center text-amber-500 shrink-0 text-sm">🤖</div>
  <div class="flex-1 min-w-0"><div class="text-slate-300 leading-relaxed text-sm max-w-none" id="streamText"></div></div>`;
  container.appendChild(msg);
  
  const el = msg.querySelector('#streamText');
  const txt = data.response;
  
  for (let i = 0; i <= txt.length; i += 2) {
    el.innerHTML = formatMarkdown(txt.slice(0, i)) + '<span class="streaming-cursor"></span>';
    container.scrollTop = container.scrollHeight;
    if (i < txt.length) await sleep(25 + Math.random() * 15);
  }
  el.innerHTML = formatMarkdown(txt);
  currentSession.isStreaming = false;
  
  // Lawyer card (compact)
  if (data.lawyers?.[0]) {
    const l = data.lawyers[0];
    await sleep(150);
    const card = document.createElement('div');
    card.className = 'lawyer-card flex items-center gap-2 p-2 bg-slate-900/40 border border-slate-800 rounded-lg mt-2 cursor-pointer opacity-0 translate-y-1';
    card.innerHTML = `<div class="w-7 h-7 bg-slate-800 rounded-full flex items-center justify-center text-amber-500 text-xs">${l.name.charAt(0)}</div>
    <div class="flex-1"><div class="text-xs font-medium text-slate-200">${l.name}</div><div class="text-[10px] text-slate-500">${l.spec} ★${l.rating}</div></div>`;
    card.onclick = () => showToast('Yurist profili tez orada');
    msg.querySelector('.flex-1').appendChild(card);
    requestAnimationFrame(() => { card.style.transition = 'all 0.3s'; card.classList.remove('opacity-0', 'translate-y-1'); });
  }
  
  updateHistoryPreview(text.slice(0, 25) + '...');
  container.scrollTop = container.scrollHeight;
}

function formatMarkdown(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong class="prose-strong">$1</strong>')
    .replace(/\*(.*?)\*/g, '<em class="prose-em">$1</em>')
    .replace(/`(.*?)`/g, '<code class="prose-code">$1</code>')
    .replace(/\n/g, '<br>')
    .replace(/^- /gm, '• ');
}

function addMessage(text, sender) {
  const container = document.getElementById('messagesContainer');
  const isAI = sender === 'ai';
  const div = document.createElement('div');
  div.className = `flex gap-3 ${isAI ? '' : 'flex-row-reverse'} message-enter`;
  div.innerHTML = `<div class="w-8 h-8 ${isAI ? 'bg-slate-800 border border-slate-700 text-amber-500' : 'bg-amber-600 text-slate-950'} rounded-lg flex items-center justify-center shrink-0 text-sm">${isAI ? '🤖' : '👤'}</div>
  <div class="flex-1 ${isAI ? '' : 'text-right'} min-w-0 max-w-[85%]">
    ${!isAI ? '<div class="text-[10px] text-slate-500 mb-0.5">Siz</div>' : ''}
    <div class="${isAI ? '' : 'bg-slate-800/50 border border-slate-700/50 text-slate-200'} px-3 py-2 rounded-xl ${isAI ? '' : 'rounded-tr-none'} text-sm leading-relaxed inline-block text-left">
      ${escapeHtml(text).replace(/\n/g, '<br>')}
    </div>
  </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  currentSession.messages.push({ sender, text });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// === New Chat ===
function startNewChat() {
  if (currentSession.messages.length) saveSession(currentSession);
  currentSession = { id: generateId(), messages: [], isStreaming: false };
  document.getElementById('messagesContainer').innerHTML = `
    <div id="welcomeScreen" class="max-w-xl mx-auto">
      <div class="text-center mb-2 px-1">
        <h1 class="serif text-lg font-semibold text-slate-100 mb-1">Yuridik yordam</h1>
        <p class="text-slate-500 text-xs">Mavzuni tanlang yoki savolingizni yozing:</p>
      </div>
      <div class="grid grid-cols-3 gap-1.5 mb-3">
        <button onclick="sendQuickMessage('Mehnat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">💼</span><span class="text-[10px] font-medium text-slate-300">Mehnat</span></button>
        <button onclick="sendQuickMessage('Oilaviy huquq')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">❤️</span><span class="text-[10px] font-medium text-slate-300">Oilaviy</span></button>
        <button onclick="sendQuickMessage('Ko\'chmas mulk')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">🏠</span><span class="text-[10px] font-medium text-slate-300">Mulk</span></button>
        <button onclick="sendQuickMessage('Meros huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">📜</span><span class="text-[10px] font-medium text-slate-300">Meros</span></button>
        <button onclick="sendQuickMessage('Biznes huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">🏢</span><span class="text-[10px] font-medium text-slate-300">Biznes</span></button>
        <button onclick="sendQuickMessage('Jinoyat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">⚖️</span><span class="text-[10px] font-medium text-slate-300">Jinoyat</span></button>
      </div>
      <div class="flex items-center justify-center gap-2 text-[9px] text-slate-600 uppercase"><span>🔒 Xavfsiz</span><span class="w-1 h-1 bg-slate-700 rounded-full"></span><span>🛡️ Maxfiy</span></div>
    </div>`;
  document.getElementById('messageInput')?.focus();
  if (window.innerWidth < 1024) toggleSidebar();
}

// === History ===
function addHistoryItem(title, id) {
  const history = document.getElementById('chatHistory');
  const empty = document.getElementById('emptyHistory');
  if (empty) empty.style.display = 'none';
  const item = document.createElement('div');
  item.className = 'flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer text-xs text-slate-400 btn-active';
  item.dataset.id = id;
  item.innerHTML = `<span class="text-slate-600">💬</span><span class="truncate flex-1">${escapeHtml(title)}</span>`;
  item.onclick = () => { showToast('Yuklandi'); };
  history.insertBefore(item, history.firstChild);
}

function updateHistoryPreview(text) {
  const items = document.querySelectorAll('#chatHistory > div');
  if (items[0]?.lastElementChild) items[0].lastElementChild.textContent = text;
}

function saveSession(s) {
  try {
    const sessions = JSON.parse(localStorage.getItem('chatSessions') || '[]');
    sessions.unshift({ id: s.id, messages: s.messages, timestamp: Date.now(), preview: s.messages[0]?.text?.slice(0, 25) || 'Suhbat' });
    localStorage.setItem('chatSessions', JSON.stringify(sessions.slice(0, 15)));
  } catch (e) {}
}

function loadSavedSessions() {
  try {
    const sessions = JSON.parse(localStorage.getItem('chatSessions') || '[]');
    const history = document.getElementById('chatHistory');
    const empty = document.getElementById('emptyHistory');
    if (sessions.length && empty) empty.style.display = 'none';
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer text-xs text-slate-400 btn-active';
      item.innerHTML = `<span class="text-slate-600">💬</span><span class="truncate flex-1">${escapeHtml(s.preview || 'Suhbat')}</span>`;
      item.onclick = () => showToast('Yuklandi');
      history.appendChild(item);
    });
  } catch (e) {}
}

// === Utilities ===
function shareChat() {
  const text = currentSession.messages.map(m => `${m.sender === 'user' ? 'Siz' : 'AI'}: ${m.text}`).join('\n');
  if (navigator.share) navigator.share({ title: 'Legal AI', text: text.slice(0, 400), url: location.href }).catch(() => {});
  else { copyToClipboard(location.href); }
}

function toggleSettings() { showToast('Tez orada'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 text-slate-200 px-4 py-2 rounded-lg text-xs font-medium z-50 message-enter';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 8px)'; setTimeout(() => t.remove(), 200); }, 2000);
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); showToast('Nusxa olindi'); }
  catch { showToast('Xato'); }
}

// === Events ===
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  const btn = document.querySelector('button[onclick="toggleSidebar()"]');
  if (window.innerWidth < 1024 && !sb.classList.contains('-translate-x-full') && !sb.contains(e.target) && !btn?.contains(e.target)) toggleSidebar();
});

window.addEventListener('resize', () => {
  const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebarOverlay');
  if (window.innerWidth >= 1024) { sb?.classList.remove('-translate-x-full'); ov?.classList.add('hidden'); }
  else { sb?.classList.add('-translate-x-full'); }
});
</script>
