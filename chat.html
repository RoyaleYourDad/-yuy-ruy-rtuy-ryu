<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legal AI Uzbekistan | Professional Legal Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background-color: #0f172a; touch-action: manipulation; }
.serif { font-family: 'Crimson Pro', serif; }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
.glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.1); }
.message-enter { animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
@keyframes messageSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.streaming-cursor::after { content: ''; display: inline-block; width: 2px; height: 1.2em; background: #fbbf24; margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
.lawyer-card { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
.lawyer-card:hover { transform: translateX(4px); border-color: rgba(251, 191, 36, 0.3); }
.input-glow:focus-within { box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1); }
.status-pulse { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
.btn-active:active { transform: scale(0.98); }
@media (pointer: coarse) { button, a, [role="button"] { min-height: 44px; min-width: 44px; } }
@supports (padding: max(0px)) { body { padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); } }
.prose-strong { color: #f1f5f9; font-weight: 600; }
.prose-em { color: #94a3b8; font-style: italic; }
.prose-code { background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #fbbf24; font-family: monospace; font-size: 0.875em; }
</style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased h-screen flex flex-col overflow-hidden selection:bg-amber-500/30 selection:text-amber-100">

<!-- Navigation -->
<nav class="glass-panel border-b border-slate-800/50 px-4 py-3 flex items-center justify-between shrink-0 z-50">
  <div class="flex items-center gap-3">
    <a href="index.html" class="flex items-center gap-2" aria-label="Bosh sahifa">
      <div class="w-9 h-9 bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>
      </div>
      <span class="serif text-lg font-semibold text-slate-100 tracking-tight hidden sm:block">Legal AI</span>
    </a>
  </div>
  <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400 hover:text-slate-200" aria-label="Menyu">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</nav>

<!-- Main Container -->
<div class="flex-1 flex overflow-hidden relative">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-slate-900/50 border-r border-slate-800/50 flex flex-col fixed lg:relative h-full transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-40">
    <div class="p-3 border-b border-slate-800/50">
      <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-lg text-sm font-medium transition-all border border-slate-700 btn-active">
        <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
        Yangi suhbat
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-2 space-y-1 scrollbar-hide">
      <div class="text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2 px-2">Tarix</div>
      <div id="chatHistory" class="space-y-1"></div>
      <div id="emptyHistory" class="text-center py-6 px-3">
        <p class="text-xs text-slate-600">Hali suhbatlar yo'q</p>
      </div>
    </div>
    <div class="p-3 border-t border-slate-800/50 bg-slate-900/30">
      <div class="flex items-center gap-2 p-2 rounded-lg bg-slate-800/50 border border-slate-700/50">
        <div class="w-7 h-7 bg-slate-700 rounded-full flex items-center justify-center text-slate-400 text-xs">M</div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-medium text-slate-300 truncate">Mehmon</div>
        </div>
      </div>
    </div>
  </aside>
  
  <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-30 hidden lg:hidden"></div>
  
  <!-- Chat Area -->
  <main class="flex-1 flex flex-col bg-slate-950 relative w-full">
    <!-- Header -->
    <div class="glass-panel border-b border-slate-800/50 px-4 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500 hover:text-slate-300 rounded-lg" aria-label="Sidebar">☰</button>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 bg-emerald-500 rounded-full status-pulse"></div>
          <span class="font-medium text-slate-200 text-sm">AI Yuridik Assistent</span>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="shareChat()" class="p-2 text-slate-500 hover:text-slate-300 rounded-lg btn-active" aria-label="Ulashish">📤</button>
        <button onclick="toggleSettings()" class="p-2 text-slate-500 hover:text-slate-300 rounded-lg btn-active" aria-label="Sozlamalar">⚙️</button>
      </div>
    </div>
    
    <!-- Messages -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto px-3 py-3 space-y-3 scrollbar-hide" role="log" aria-live="polite">
      <!-- Welcome Screen - Ultra Compact for Mobile -->
      <div id="welcomeScreen" class="max-w-xl mx-auto">
        <div class="text-center mb-2 px-1">
          <h1 class="serif text-lg font-semibold text-slate-100 mb-1">Yuridik yordam</h1>
          <p class="text-slate-500 text-xs">Mavzuni tanlang yoki savolingizni yozing:</p>
        </div>
        
        <!-- Ultra Compact Quick Actions - No Scroll on Mobile -->
        <div class="grid grid-cols-3 gap-1.5 mb-3">
          <button onclick="sendQuickMessage('Mehnat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">💼</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Mehnat</span>
          </button>
          <button onclick="sendQuickMessage('Oilaviy huquq')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">❤️</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Oilaviy</span>
          </button>
          <button onclick="sendQuickMessage('Ko\'chmas mulk')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">🏠</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Mulk</span>
          </button>
          <button onclick="sendQuickMessage('Meros huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">📜</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Meros</span>
          </button>
          <button onclick="sendQuickMessage('Biznes huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">🏢</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Biznes</span>
          </button>
          <button onclick="sendQuickMessage('Jinoyat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 hover:bg-slate-800/40 transition-all text-center btn-active">
            <span class="text-base">⚖️</span>
            <span class="text-[10px] font-medium text-slate-300 leading-none">Jinoyat</span>
          </button>
        </div>
        
        <div class="flex items-center justify-center gap-2 text-[9px] text-slate-600 uppercase tracking-wide">
          <span>🔒 Xavfsiz</span>
          <span class="w-1 h-1 bg-slate-700 rounded-full"></span>
          <span>🛡️ Maxfiy</span>
        </div>
      </div>
    </div>
    
    <!-- Input Area - Ultra Compact -->
    <div class="border-t border-slate-800/50 bg-slate-900/30 p-2">
      <div class="max-w-3xl mx-auto">
        <div class="flex items-end gap-2 bg-slate-900 border border-slate-700 rounded-xl p-1.5 input-glow transition-all focus-within:border-amber-500/50">
          <button class="p-2 text-slate-500 hover:text-slate-300 rounded-lg btn-active" title="Fayl" aria-label="Fayl">📎</button>
          <textarea id="messageInput" placeholder="Savolingiz..." rows="1" oninput="autoResize(this)" onkeydown="handleKeyDown(event)"
            class="flex-1 bg-transparent border-none resize-none py-2 px-2.5 max-h-20 outline-none text-slate-200 placeholder:text-slate-600 scrollbar-hide text-sm leading-relaxed"
            aria-label="Xabar matni"></textarea>
          <button id="sendBtn" onclick="sendMessage()" disabled
            class="p-2 bg-amber-600 hover:bg-amber-500 disabled:opacity-40 disabled:cursor-not-allowed text-slate-950 rounded-lg transition-all font-medium shrink-0 btn-active"
            aria-label="Yuborish">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// === Knowledge Base (Concise responses for mobile) ===
const knowledgeBase = {
  'mehnat': {
    keywords: ['mehnat', 'ish', 'ishdan', 'bo\'satish', 'shartnoma', 'ish haqi', 'maosh', 'xodim'],
    response: `**Mehnat huquqi**\n\n• Shartnoma yozma, 2 nusxada (MK 72)\n• Ish vaqti: 40 soat/hafta (MK 115)\n• Bo'shatish: 2 hafta oldin ogohlantirish (MK 159)\n• Sudga murojaat: 3 oy (MK 242)\n\n⚠️ Ogohlantirishsiz bo'shatish qonunga zidd.`,
    lawyers: [{ name: 'Saidova N.', spec: 'Mehnat', rating: 4.8, id: 4 }]
  },
  'oilaviy': {
    keywords: ['nikoh', 'ajrashish', 'oilaviy', 'aliment', 'farzand', 'ota-ona'],
    response: `**Oilaviy huquq**\n\n• Ajrashish: sud yoki fuqarolik aktlari orqali\n• Aliment: 1 farzand 25%, 2 ta 33%, 3+ 50%\n• Farzandlar: <10 yosh ona bilan, >15 o'zi tanlaydi\n\n*Oilaviy nizolar murakkab, yurist maslahati kerak.*`,
    lawyers: [{ name: 'Karimova D.', spec: 'Oilaviy', rating: 4.9, id: 2 }]
  },
  'mulk': {
    keywords: ['uy', 'kvartira', 'ko\'chmas', 'mulk', 'yer', 'sotib', 'ijara'],
    response: `**Ko'chmas mulk**\n\n• Sotish-olish: davlat ro'yxati shart (FK 224)\n• Ijara: <1 yil yozma shart shart emas\n• Ipoteka: boshlang'ich 20-30%, muddat 3-20 yil\n\n*Mulk operatsiyalarida yurist yordami zarur.*`,
    lawyers: [{ name: 'Tursunov B.', spec: 'Mulk', rating: 4.8, id: 5 }]
  },
  'meros': {
    keywords: ['meros', 'vorislik', 'vasiyatnoma', 'mulk', 'vafot'],
    response: `**Meros huquqi**\n\n1-navbat: turmush o'rtog'i, farzandlar, ota-ona\n2-navbat: aka-uka, opa-singil\n3-navbat: amaki-xolalar\n\n• Meros qabul qilish: 3 oy\n• Vasiyatnoma: notariusda tasdiqlash mumkin`,
    lawyers: [{ name: 'Ahmedova M.', spec: 'Meros', rating: 4.9, id: 6 }]
  },
  'biznes': {
    keywords: ['biznes', 'registratsiya', 'shartnoma', 'litsenziya', 'tashkilot'],
    response: `**Biznes huquqi**\n\n• Davlat ro'yxatidan o'tkazish shart\n• Soliq hisobiga qo'yilish\n• Litsenziya (agar kerak)\n• Shartnomalar: yozma/elektron imzo\n\n*Biznes huquqiy masalalarda professional yordam muhim.*`,
    lawyers: [{ name: 'Rahimov J.', spec: 'Biznes', rating: 4.7, id: 3 }]
  },
  'jinoyat': {
    keywords: ['jinoyat', 'sud', 'advokat', 'qamoq', 'jarima', 'ayb'],
    response: `**Jinoyat huquqi**\n\nAyblanuvchi huquqlari:\n• Advokat talab qilish\n• O'zini himoya qilish\n• Appelyatsiya berish\n\n⚠️ **Muhim:** Jinoyat ishi ochilganda darhol advokat yollang. Hech narsani imzo qilmang.`,
    lawyers: [{ name: 'Azizov S.', spec: 'Jinoyat', rating: 4.8, id: 1 }]
  }
};

// === State ===
let currentSession = { id: generateId(), messages: [], isStreaming: false };

// === Init ===
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('messageInput');
  if (input) input.focus();
  loadSavedSessions();
});

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

// === Sidebar ===
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = !sidebar.classList.contains('-translate-x-full');
  sidebar.classList.toggle('-translate-x-full', isOpen);
  overlay?.classList.toggle('hidden', isOpen);
}

// === Input ===
function autoResize(t) {
  t.style.height = 'auto';
  t.style.height = Math.min(t.scrollHeight, 80) + 'px';
  document.getElementById('sendBtn').disabled = !t.value.trim();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuickMessage(text) {
  const input = document.getElementById('messageInput');
  if (input) { input.value = text; autoResize(input); sendMessage(); }
}

// === Send ===
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input?.value.trim();
  if (!text || currentSession.isStreaming) return;
  
  document.getElementById('welcomeScreen').style.display = 'none';
  addMessage(text, 'user');
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  
  await streamResponse(findResponse(text));
}

function findResponse(text) {
  const lower = text.toLowerCase();
  for (const [key, data] of Object.entries(knowledgeBase)) {
    if (data.keywords.some(k => lower.includes(k))) return data;
  }
  return {
    response: `**Mavzu topilmadi**\n\nQuyidagilardan birini tanlang:\n• Mehnat huquqi\n• Oilaviy huquq\n• Ko'chmas mulk\n• Meros huquqi\n• Biznes huquqi\n• Jinoyat huquqi\n\nYoki savolingizni aniqroq yozing.`,
    lawyers: [{ name: 'Azizov S.', spec: 'Umumiy', rating: 4.8, id: 1 }]
  };
}

// === Stream Response ===
async function streamResponse(data) {
  currentSession.isStreaming = true;
  const container = document.getElementById('messagesContainer');
  
  const msg = document.createElement('div');
  msg.className = 'flex gap-3 message-enter';
  msg.innerHTML = `<div class="w-8 h-8 bg-slate-800 border border-slate-700 rounded-lg flex items-center justify-center text-amber-500 shrink-0 text-sm">🤖</div>
  <div class="flex-1 min-w-0"><div class="text-slate-300 leading-relaxed text-sm max-w-none" id="streamText"></div></div>`;
  container.appendChild(msg);
  
  const el = msg.querySelector('#streamText');
  const txt = data.response;
  
  for (let i = 0; i <= txt.length; i += 2) {
    el.innerHTML = formatMarkdown(txt.slice(0, i)) + '<span class="streaming-cursor"></span>';
    container.scrollTop = container.scrollHeight;
    if (i < txt.length) await sleep(25 + Math.random() * 15);
  }
  el.innerHTML = formatMarkdown(txt);
  currentSession.isStreaming = false;
  
  // Lawyer card (compact)
  if (data.lawyers?.[0]) {
    const l = data.lawyers[0];
    await sleep(150);
    const card = document.createElement('div');
    card.className = 'lawyer-card flex items-center gap-2 p-2 bg-slate-900/40 border border-slate-800 rounded-lg mt-2 cursor-pointer opacity-0 translate-y-1';
    card.innerHTML = `<div class="w-7 h-7 bg-slate-800 rounded-full flex items-center justify-center text-amber-500 text-xs">${l.name.charAt(0)}</div>
    <div class="flex-1"><div class="text-xs font-medium text-slate-200">${l.name}</div><div class="text-[10px] text-slate-500">${l.spec} ★${l.rating}</div></div>`;
    card.onclick = () => showToast('Yurist profili tez orada');
    msg.querySelector('.flex-1').appendChild(card);
    requestAnimationFrame(() => { card.style.transition = 'all 0.3s'; card.classList.remove('opacity-0', 'translate-y-1'); });
  }
  
  updateHistoryPreview(text.slice(0, 25) + '...');
  container.scrollTop = container.scrollHeight;
}

function formatMarkdown(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong class="prose-strong">$1</strong>')
    .replace(/\*(.*?)\*/g, '<em class="prose-em">$1</em>')
    .replace(/`(.*?)`/g, '<code class="prose-code">$1</code>')
    .replace(/\n/g, '<br>')
    .replace(/^- /gm, '• ');
}

function addMessage(text, sender) {
  const container = document.getElementById('messagesContainer');
  const isAI = sender === 'ai';
  const div = document.createElement('div');
  div.className = `flex gap-3 ${isAI ? '' : 'flex-row-reverse'} message-enter`;
  div.innerHTML = `<div class="w-8 h-8 ${isAI ? 'bg-slate-800 border border-slate-700 text-amber-500' : 'bg-amber-600 text-slate-950'} rounded-lg flex items-center justify-center shrink-0 text-sm">${isAI ? '🤖' : '👤'}</div>
  <div class="flex-1 ${isAI ? '' : 'text-right'} min-w-0 max-w-[85%]">
    ${!isAI ? '<div class="text-[10px] text-slate-500 mb-0.5">Siz</div>' : ''}
    <div class="${isAI ? '' : 'bg-slate-800/50 border border-slate-700/50 text-slate-200'} px-3 py-2 rounded-xl ${isAI ? '' : 'rounded-tr-none'} text-sm leading-relaxed inline-block text-left">
      ${escapeHtml(text).replace(/\n/g, '<br>')}
    </div>
  </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  currentSession.messages.push({ sender, text });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// === New Chat ===
function startNewChat() {
  if (currentSession.messages.length) saveSession(currentSession);
  currentSession = { id: generateId(), messages: [], isStreaming: false };
  document.getElementById('messagesContainer').innerHTML = `
    <div id="welcomeScreen" class="max-w-xl mx-auto">
      <div class="text-center mb-2 px-1">
        <h1 class="serif text-lg font-semibold text-slate-100 mb-1">Yuridik yordam</h1>
        <p class="text-slate-500 text-xs">Mavzuni tanlang yoki savolingizni yozing:</p>
      </div>
      <div class="grid grid-cols-3 gap-1.5 mb-3">
        <button onclick="sendQuickMessage('Mehnat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">💼</span><span class="text-[10px] font-medium text-slate-300">Mehnat</span></button>
        <button onclick="sendQuickMessage('Oilaviy huquq')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">❤️</span><span class="text-[10px] font-medium text-slate-300">Oilaviy</span></button>
        <button onclick="sendQuickMessage('Ko\'chmas mulk')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">🏠</span><span class="text-[10px] font-medium text-slate-300">Mulk</span></button>
        <button onclick="sendQuickMessage('Meros huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">📜</span><span class="text-[10px] font-medium text-slate-300">Meros</span></button>
        <button onclick="sendQuickMessage('Biznes huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">🏢</span><span class="text-[10px] font-medium text-slate-300">Biznes</span></button>
        <button onclick="sendQuickMessage('Jinoyat huquqi')" class="flex flex-col items-center justify-center gap-1 p-2 bg-slate-900/40 border border-slate-800 rounded-lg hover:border-amber-500/40 transition-all text-center btn-active"><span class="text-base">⚖️</span><span class="text-[10px] font-medium text-slate-300">Jinoyat</span></button>
      </div>
      <div class="flex items-center justify-center gap-2 text-[9px] text-slate-600 uppercase"><span>🔒 Xavfsiz</span><span class="w-1 h-1 bg-slate-700 rounded-full"></span><span>🛡️ Maxfiy</span></div>
    </div>`;
  document.getElementById('messageInput')?.focus();
  if (window.innerWidth < 1024) toggleSidebar();
}

// === History ===
function addHistoryItem(title, id) {
  const history = document.getElementById('chatHistory');
  const empty = document.getElementById('emptyHistory');
  if (empty) empty.style.display = 'none';
  const item = document.createElement('div');
  item.className = 'flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer text-xs text-slate-400 btn-active';
  item.dataset.id = id;
  item.innerHTML = `<span class="text-slate-600">💬</span><span class="truncate flex-1">${escapeHtml(title)}</span>`;
  item.onclick = () => { showToast('Yuklandi'); };
  history.insertBefore(item, history.firstChild);
}

function updateHistoryPreview(text) {
  const items = document.querySelectorAll('#chatHistory > div');
  if (items[0]?.lastElementChild) items[0].lastElementChild.textContent = text;
}

function saveSession(s) {
  try {
    const sessions = JSON.parse(localStorage.getItem('chatSessions') || '[]');
    sessions.unshift({ id: s.id, messages: s.messages, timestamp: Date.now(), preview: s.messages[0]?.text?.slice(0, 25) || 'Suhbat' });
    localStorage.setItem('chatSessions', JSON.stringify(sessions.slice(0, 15)));
  } catch (e) {}
}

function loadSavedSessions() {
  try {
    const sessions = JSON.parse(localStorage.getItem('chatSessions') || '[]');
    const history = document.getElementById('chatHistory');
    const empty = document.getElementById('emptyHistory');
    if (sessions.length && empty) empty.style.display = 'none';
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800/50 cursor-pointer text-xs text-slate-400 btn-active';
      item.innerHTML = `<span class="text-slate-600">💬</span><span class="truncate flex-1">${escapeHtml(s.preview || 'Suhbat')}</span>`;
      item.onclick = () => showToast('Yuklandi');
      history.appendChild(item);
    });
  } catch (e) {}
}

// === Utilities ===
function shareChat() {
  const text = currentSession.messages.map(m => `${m.sender === 'user' ? 'Siz' : 'AI'}: ${m.text}`).join('\n');
  if (navigator.share) navigator.share({ title: 'Legal AI', text: text.slice(0, 400), url: location.href }).catch(() => {});
  else { copyToClipboard(location.href); }
}

function toggleSettings() { showToast('Tez orada'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 text-slate-200 px-4 py-2 rounded-lg text-xs font-medium z-50 message-enter';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 8px)'; setTimeout(() => t.remove(), 200); }, 2000);
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); showToast('Nusxa olindi'); }
  catch { showToast('Xato'); }
}

// === Events ===
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  const btn = document.querySelector('button[onclick="toggleSidebar()"]');
  if (window.innerWidth < 1024 && !sb.classList.contains('-translate-x-full') && !sb.contains(e.target) && !btn?.contains(e.target)) toggleSidebar();
});

window.addEventListener('resize', () => {
  const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebarOverlay');
  if (window.innerWidth >= 1024) { sb?.classList.remove('-translate-x-full'); ov?.classList.add('hidden'); }
  else { sb?.classList.add('-translate-x-full'); }
});
</script>
